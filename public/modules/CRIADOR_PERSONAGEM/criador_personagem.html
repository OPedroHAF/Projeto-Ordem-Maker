<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordem Maker - Personagem</title>
    <link rel="stylesheet" href="../../assets/styles/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="content-body-criador_personagem">
    <nav class="navbar navbar-expand-lg bg-dark navbar-custom-color" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Ordem Maker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active" aria-current="page" href="#">Dados Gerais</a>
                    <a class="nav-link" href="#">Perícias</a>
                    <a class="nav-link" href="#">Atributos</a>
                    <a class="nav-link" href="#">Itens</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="ps-2 pe-2">
        <div class="container-fluid py-3 position-relative">
            <div class="row text-center">
                <div class="col-12">
                    <div id="character_pfp_container">
                        <img class="w-100 h-100 object-fit-cover" src="../../assets/images/pics/default_character_pfp.webp" alt="Character img">
                    </div>
                </div>
            </div>
            <div id="container-character_life_sanity" class="row position-absolute bottom-0 start-50 translate-middle-x z-1">
                <div class="col-12 d-flex justify-content-center align-items-end">
                    <div class="d-flex align-items-center justify-content-center bg-dark text-white life-value-container">
                        <input type="text" class="form-control-plaintext text-white text-center" value="18/32">
                    </div>
                    <div class="d-flex align-items-center justify-content-center bg-dark text-white sanity-value-container">
                        <input type="text" class="form-control-plaintext text-white text-center" value="9">
                    </div>
                </div>
            </div>
        </div>
        <div id="lll" class="container">
            <div class="row align-items-center mb-2 mt-2">
                <div class="col-2">
                    <input type="text" class="form-control-plaintext text-white text-center bg-dark content-input-criador_personagem" value="15%">
                </div>
                <div class="col-8">
                    <input type="text" class="form-control-plaintext text-white text-center bg-dark content-input-criador_personagem" value="Jasper Yoon da Silva">
                </div>
                <div class="col-2">
                    <input type="text" class="form-control-plaintext text-white text-center bg-dark content-input-criador_personagem" value="&#128511;">
                </div>
            </div>
            <div class="row">
                <div class="col-8 mx-auto">
                    <input type="text" class="form-control-plaintext text-white text-center bg-dark content-input-criador_personagem" value="Especialista">
                </div>
            </div>
        </div>
        <div class="container">
            <div class="row mt-4">
                <div class="col-4">
                    <input type="text" class="form-control-plaintext text-center text-white bg-dark content-input-criador_personagem-defesa-pe-deslocamento fs-1" value="5">
                </div>
                <div id="aaa" class="col-4 d-flex flex-column content-input-criador_personagem-defesa-pe-deslocamento">
                    <input type="text" class="form-control-plaintext text-center text-white bg-dark fs-1 flex-grow-1 p-0 lh-0" value="5">
                    <input type="text" class="form-control-plaintext text-center text-white bg-dark fs-1 flex-grow-1 p-0 lh-0" value="5">
                </div>
                <div class="col-4">
                    <input type="text" class="form-control-plaintext text-center text-white bg-dark content-input-criador_personagem-defesa-pe-deslocamento fs-1" value="5">
                </div>
            </div>
        </div>

        <div class="container mt-4">
            <div class="row text-white text-center justify-content-center">
                <div class="col-12">
                    <div class="accordion" id="areaProtecao">
                        <div class="accordion-item bg-dark text-white border-secondary">
                            <h2 class="accordion-header">
                                <button class="accordion-button bg-dark text-white collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#areaProtecaoOpen" aria-controls="areaProtecaoOpen" aria-expanded="false">
                                    Proteção
                                </button>
                            </h2>
                            <div id="areaProtecaoOpen" class="accordion-collapse collapse">
                                <div class="accordion-body bg-dark">
                                    <div id="lista-protecoes">
                                    
                                    </div>
                                    <button type="button" class="btn btn-sm btn-outline-success w-100 mt-2">
                                        + Adicionar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="accordion mt-4" id="areaResistencia">
                        <div class="accordion-item bg-dark text-white border-secondary">
                            <h2 class="accordion-header">
                                <button class="accordion-button bg-dark text-white collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#areaResistenciaOpen" aria-controls="areaResistenciaOpen" aria-expanded="false">
                                    Resistência
                                </button>
                            </h2>
                            <div id="areaResistenciaOpen"  class="accordion-collapse collapse">
                                <div class="accordion-body bg-dark">
                                    <div class="lista-resistencias">

                                    </div>
                                    <button type="button" class="btn btn-sm btn-outline-success w-100 mt-2">
                                        + Adicionar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="container mt-4">
            <div class="row text-white">
                <div class="col-12">
                    <p id="origemTitulo" class="text-center">Origem</p>
                </div>
                <div class="col-12">
                    <div class="mt-2">
                        <select id="origemSelect" class="form-select bg-dark text-white border-secondary" aria-label="Form para selecionar a origem">
                            <option value="" selected disabled></option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                        </select>
                    </div>
                </div>
                <div class="col-12">
                    <div class="mt-2">
                        <textarea id="origemTexto" class="form-control bg-dark text-white"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
